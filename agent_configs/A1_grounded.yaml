# SAFE-CARE Bench — ablation tier A1
# Capability declaration only. Implementation-neutral by design: this file states
# WHICH capabilities are active at this tier, not how any particular system
# implements them. Substitute your own runtime when reproducing.

agent_id: "A1"
tier: "A1"
name: "Grounded Educational Agent"

description: >
  Adds retrieval over an approved clinical knowledge base
  Every factual or clinical claim must carry an inline citation to a retrieved source
  Isolates the contribution of evidence grounding.

# ---------------------------------------------------------------------------
# Model — held constant across all tiers so that differences are attributable
# to the capability layer alone, not to model choice or sampling variance.
# ---------------------------------------------------------------------------
model:
  provider: "<your-llm-provider>"       # any chat-completion endpoint
  deployment: "<your-model-deployment>"
  temperature: 0.0                       # deterministic for reproducibility
  max_tokens: 800
  seed: 42

# ---------------------------------------------------------------------------
# Capability flags — the independent variable of the ablation
# ---------------------------------------------------------------------------
features:
  rag: true
  guardrails: false
  memory: false
  profiling: false
  tool_use: true

# ---------------------------------------------------------------------------
# Retrieval
# ---------------------------------------------------------------------------
rag:
  enabled: true
  retrieval: "vector search over an approved clinical knowledge base"
  k: 2
  score_threshold: 0.7
  deduplication: "chunk-level within a session"
  citation_requirement: >
    Every factual or clinical claim carries an inline citation immediately after
    the statement. End-of-response citation lists do not satisfy this requirement.

# ---------------------------------------------------------------------------
# Guardrails
# ---------------------------------------------------------------------------
guardrails:
  enabled: false
  # No input or output screening. Unsafe or off-topic content is not intercepted.

# ---------------------------------------------------------------------------
# Memory
# ---------------------------------------------------------------------------
memory:
  enabled: false
  # No context beyond the current turn. Each exchange is answered from scratch.

# ---------------------------------------------------------------------------
# Profiling
# ---------------------------------------------------------------------------
profiling:
  enabled: false
  # No structured profile collection at this tier.
