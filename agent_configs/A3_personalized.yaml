# =============================================================================
# SAFE-CARE Bench - ablation tier A3
#
# Capability declaration only. Implementation-neutral by design: this file
# states WHICH capabilities are active at this tier, not how any particular
# system implements them. Substitute your own runtime when reproducing.
#
# NOTE ON THE LADDER. Adjacent tiers differ by a *capability bundle*, not
# always by a single flag. Bundles are grouped so that the members of a bundle
# are not independently interpretable - see `delta_from_previous` below and the
# "Capability bundles, not one-variable ablation" section of the README. Report
# adjacent-tier deltas as the effect of the named bundle.
# =============================================================================

agent_id: "A3"
tier: "A3"
name: "Context-Aware Personalized Agent"
bundle_added: "Personalization (read-side)"

description: >
  Adds the read-side personalization bundle: within-session context, cross-session memory retrieval, and progressive profiling. The agent may read prior context and collect structured profile fields one question at a time. It does not yet write derived state back.

# -----------------------------------------------------------------------------
# Model - held constant across all tiers so that differences are attributable
# to the capability bundle alone, not to model choice or sampling variance.
# -----------------------------------------------------------------------------
model:
  provider: "<your-llm-provider>"        # any chat-completion endpoint
  deployment: "<your-model-deployment>"
  temperature: 0.0                       # deterministic for reproducibility
  max_tokens: 800
  seed: 42

# -----------------------------------------------------------------------------
# Capability vector - the independent variable of the ablation.
# Every tier declares all 10 flags explicitly. A capability that is absent is
# declared false rather than omitted, so that any two tiers can be diffed
# mechanically and the delta is unambiguous.
# -----------------------------------------------------------------------------
features:
  retrieval:               true   # Vector search over an approved clinical knowledge base.
  citation_enforcement:    true   # Every clinical claim must carry an inline citation to a retrieved source.
  safety_guardrails:       true   # Layered input and output screening against a configurable rule set.
  session_context:         true   # Carries context within a single conversation.
  cross_session_memory:    true   # Reads timestamped, user-correctable context from prior sessions.
  progressive_profiling:   true   # Collects structured profile fields one question per turn.
  profile_write_back:      false  # Writes user-confirmed profile fields back to durable state.
  life_stage_inference:    false  # Derives a life-stage label with a confidence value from profile signals.
  application_tools:       false  # Permissioned non-retrieval tools that act on user state.
  closed_loop_actions:     false  # Initiates follow-up actions across turns without a fresh user request.

# -----------------------------------------------------------------------------
# Delta from the previous tier
# -----------------------------------------------------------------------------
delta_from_previous:
  bundle: "Personalization (read-side)"
  flags_enabled:
    - session_context
    - cross_session_memory
    - progressive_profiling
  interpretation: >
    The A2-to-A3 delta measures the joint effect of the flags listed
    above. It is a multi-flag bundle and may NOT be attributed to any one member.


# -----------------------------------------------------------------------------
# Retrieval
# -----------------------------------------------------------------------------
retrieval:
  enabled: true
  method: "vector search over an approved clinical knowledge base"
  k: 2
  score_threshold: 0.7
  deduplication: "chunk-level within a session"
  citation_requirement: >
    Every factual or clinical claim carries an inline citation immediately
    after the statement. End-of-response citation lists do not satisfy this
    requirement.

# -----------------------------------------------------------------------------
# Guardrails
# -----------------------------------------------------------------------------
guardrails:
  enabled: true
  scope: ["input", "output"]
  input_behavior: >
    Screened before the model is invoked. A flagged input returns a
    pre-configured refusal or escalation message; the model is not called.
  output_behavior: >
    Screened after generation, including link validation. A flagged response
    is suppressed or replaced.
  configuration: "externally configurable rule set, hot-reloadable"

# -----------------------------------------------------------------------------
# Memory
# -----------------------------------------------------------------------------
memory:
  session_context: true
  cross_session: true
  operations: ["retrieve_prior_context", "save_detail"]
  requirement: >
    Stored items are timestamped and user-correctable. Stale entries must not
    be presented as current state.

# -----------------------------------------------------------------------------
# Profiling
# -----------------------------------------------------------------------------
profiling:
  enabled: true
  method: "progressive - one targeted question per turn, never a bulk intake form"
  fields_collected:
    - cycle_status
    - cycle_pattern
    - active_symptoms
    - hormone_therapy_status
    - surgical_history
    - age_band
  confirmation_rule: >
    Sensitive fields require explicit user confirmation before storage.
    Uncertain values are not written.

# -----------------------------------------------------------------------------
# Agency
# -----------------------------------------------------------------------------
agency:
  profile_write_back: false
  life_stage_inference: false
  application_tools: false
  closed_loop_actions: false
  # No write-back, inference, application tools, or closed-loop behaviour at this tier.
